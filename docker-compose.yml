include:
  - path: ./packages/db/docker-compose.yml

services:
    server:
        container_name: xenous-server
        build:
            context: .
            dockerfile: ./apps/server/Dockerfile
        env_file:
          - path: ./.env
            required: false
          - path: ./apps/server/.env.local
            required: false
        ports:
          - 127.0.0.1:3000:3000
        healthcheck:
            test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1:3000]
            interval: 10s
            timeout: 5s
            retries: 5
    web:
        container_name: xenous-web
        build:
            context: .
            dockerfile: ./apps/web/Dockerfile
        environment:
          - HOSTNAME=0.0.0.0
        env_file:
          - path: ./.env
            required: false
          - path: ./apps/web/.env.local
            required: false
        ports:
          - 127.0.0.1:3001:3001
        depends_on:
            server:
                condition: service_healthy
        healthcheck:
            test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1:3001]
            interval: 10s
            timeout: 5s
            retries: 5
    tanstack:
        container_name: xenous-tanstack
        build:
            context: .
            dockerfile: ./apps/tanstack/Dockerfile
        environment:
          - HOSTNAME=0.0.0.0
        env_file:
          - path: ./.env
            required: false
          - path: ./apps/tanstack/.env.local
            required: false
        ports:
          - 127.0.0.1:3002:3002
        depends_on:
            server:
                condition: service_healthy
        healthcheck:
            test: [CMD, wget, --no-verbose, --tries=1, --spider, http://127.0.0.1:3002]
            interval: 10s
            timeout: 5s
            retries: 5
