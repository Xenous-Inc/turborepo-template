# Lefthook configuration
# https://github.com/evilmartians/lefthook

pre-commit:
    parallel: true
    jobs:
      - name: Lint & Format
        glob: '*.{js,ts,cjs,mjs,d.ts,d.cts,d.mts,jsx,tsx,json,jsonc}'
        run: pnpm check:fix  -- --staged --no-errors-on-unmatched
        stage_fixed: true
      - name: Typecheck
        glob: '*.{js,ts,cjs,mjs,d.ts,d.cts,d.mts,jsx,tsx}'
        run: pnpm typecheck
      - name: Audit dependencies
        glob: pnpm-lock.yaml
        run: pnpm audit --prod --audit-level critical

commit-msg:
    commands:
        commitlint:
            run: pnpx commitlint --edit
